<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Archive</title>
<meta name="description" content="A searchable archive of structured knowledge articles generated from YouTube videos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbfaf7;
    --surface: #ffffff;
    --sidebar-bg: #2b2d31;
    --sidebar-hover: #3a3c41;
    --sidebar-active: #4a4d52;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #7a7a7a;
    --rule: #e8e6df;
    --accent: #8b3a1f;
    --accent-soft: #f5ede7;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06);
    --radius: 8px;
    --sidebar-w: 72px;
    --max: 1200px;
    --reading: 720px;
    --serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    --mono: 'SF Mono', Menlo, Consolas, 'Courier New', monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---------- Sidebar (Discord server-list style) ---------- */
  .sidebar {
    width: var(--sidebar-w);
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 8px;
    z-index: 100;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--sidebar-hover) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--sidebar-hover); border-radius: 2px; }

  .sidebar-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-radius .2s ease, background .2s ease;
    font-size: 16px;
    font-weight: 700;
    color: #dcddde;
    position: relative;
    flex-shrink: 0;
    text-decoration: none;
    border: none;
    user-select: none;
  }
  .sidebar-icon svg { width: 24px; height: 24px; fill: #dcddde; transition: fill .2s; }
  .sidebar-icon:hover {
    border-radius: 16px;
    background: var(--accent);
    color: #fff;
  }
  .sidebar-icon:hover svg { fill: #fff; }
  .sidebar-icon.active {
    border-radius: 16px;
    background: var(--accent);
    color: #fff;
  }
  .sidebar-icon.active svg { fill: #fff; }
  .sidebar-icon.active::before {
    content: "";
    position: absolute;
    left: -16px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 36px;
    background: #fff;
    border-radius: 0 4px 4px 0;
  }
  .sidebar-icon .tooltip {
    position: absolute;
    left: 64px;
    top: 50%;
    transform: translateY(-50%);
    background: #000;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s;
    z-index: 200;
  }
  .sidebar-icon .tooltip::before {
    content: "";
    position: absolute;
    left: -4px;
    top: 50%;
    transform: translateY(-50%);
    border: 4px solid transparent;
    border-right-color: #000;
  }
  .sidebar-icon:hover .tooltip { opacity: 1; }

  .sidebar-divider {
    width: 32px;
    height: 2px;
    background: #3a3c41;
    border-radius: 1px;
    margin: 4px 0;
    flex-shrink: 0;
  }

  .sidebar-add {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #3a3c41;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-radius .2s, background .2s;
    flex-shrink: 0;
  }
  .sidebar-add:hover { border-radius: 16px; background: #3ba55d; }
  .sidebar-add svg { width: 24px; height: 24px; fill: #3ba55d; transition: fill .2s; }
  .sidebar-add:hover svg { fill: #fff; }

  /* ---------- Main layout ---------- */
  .main-wrap {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Top bar (search only) ---------- */
  header.topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(251, 250, 247, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);
    padding: 16px 32px;
  }
  .topbar-inner {
    max-width: var(--max);
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 480px;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    font-size: 14px;
    font-family: var(--sans);
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 8px;
    color: var(--ink);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-wrap::before {
    content: "";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    background: no-repeat center / contain url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237a7a7a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'></circle><line x1='21' y1='21' x2='16.5' y2='16.5'></line></svg>");
    pointer-events: none;
  }

  /* ---------- Content ---------- */
  main {
    max-width: var(--max);
    margin: 0 auto;
    padding: 40px 32px 80px;
    width: 100%;
    flex: 1;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ---------- Page head ---------- */
  .page-head {
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }
  .page-head h1 {
    font-family: var(--serif);
    font-size: 40px;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .page-head .meta {
    color: var(--ink-muted);
    font-size: 14px;
  }

  /* ---------- Card grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: #d8d4ca;
  }
  .card .thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: #efedea center / cover no-repeat;
    display: block;
    position: relative;
  }
  .card .thumb.empty {
    background: linear-gradient(135deg, #efedea, #e3ded4);
  }
  .card .thumb .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.15);
    opacity: 0;
    transition: opacity .2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card:hover .thumb .play-overlay { opacity: 1; }
  .card .thumb .play-overlay svg {
    width: 48px; height: 48px; fill: #fff;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
  .card .body {
    padding: 18px 20px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .card .channel-name {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .card h3 {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 600;
    line-height: 1.3;
    margin: 0 0 8px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .card .summary {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin: 0 0 14px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .foot {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--ink-muted);
  }

  /* ---------- Article view ---------- */
  article.article {
    max-width: var(--reading);
    margin: 0 auto;
  }
  article.article .breadcrumb {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 24px;
  }
  article.article .breadcrumb a {
    color: var(--ink-muted);
    text-decoration: none;
    transition: color .15s;
  }
  article.article .breadcrumb a:hover { color: var(--accent); }

  article.article h1 {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 700;
    line-height: 1.12;
    letter-spacing: -0.02em;
    margin: 0 0 16px;
  }
  article.article .article-meta {
    color: var(--ink-muted);
    font-size: 14px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  article.article .article-meta .channel-name {
    color: var(--accent);
    font-weight: 600;
  }
  article.article .article-meta .sep { color: var(--rule); }

  article.article h2 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    margin: 40px 0 14px;
    letter-spacing: -0.01em;
  }
  article.article h3 {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 600;
    margin: 28px 0 10px;
  }
  article.article p {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.75;
    color: #252525;
    margin: 0 0 18px;
  }
  article.article ul, article.article ol {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.7;
    color: #252525;
    padding-left: 24px;
    margin: 0 0 22px;
  }
  article.article li { margin-bottom: 8px; }
  article.article strong { font-weight: 700; }
  article.article em { font-style: italic; }
  article.article code {
    font-family: var(--mono);
    font-size: 0.85em;
    background: #f0eee9;
    padding: 2px 6px;
    border-radius: 3px;
  }
  article.article a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: var(--accent-soft);
    text-underline-offset: 2px;
  }
  article.article a:hover { text-decoration-color: var(--accent); }

  .summary-block {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding: 20px 24px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin-bottom: 36px;
  }
  .summary-block p {
    font-size: 16px;
    margin: 0 0 10px;
    color: var(--ink);
    line-height: 1.6;
  }
  .summary-block p:last-child { margin-bottom: 0; }
  .summary-block .label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .faq-item {
    border-top: 1px solid var(--rule);
    padding: 20px 0;
  }
  .faq-item:last-child { border-bottom: 1px solid var(--rule); }
  .faq-item .q {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .faq-item .a {
    font-family: var(--serif);
    font-size: 16px;
    color: var(--ink-soft);
    line-height: 1.65;
  }
  .faq-item .a p { font-size: 16px; margin: 0 0 8px; }
  .faq-item .a p:last-child { margin-bottom: 0; }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 32px 0 8px;
  }
  .tag {
    display: inline-block;
    padding: 5px 12px;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 100px;
    color: var(--ink-soft);
    text-decoration: none;
    transition: border-color .15s, color .15s, background .15s;
    cursor: pointer;
  }
  .tag:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

  .entities {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 24px;
    margin: 36px 0;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
  }
  .entities h4 {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    margin: 0 0 8px;
  }
  .entities ul { list-style: none; padding: 0; margin: 0; }
  .entities li {
    font-size: 14px;
    color: var(--ink-soft);
    padding: 3px 0;
  }

  .article-footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .btn-back {
    display: inline-block;
    padding: 10px 18px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    color: var(--ink);
    text-decoration: none;
    font-size: 14px;
    transition: background .15s, border-color .15s;
  }
  .btn-back:hover { background: var(--bg); border-color: var(--ink-muted); }
  .source-link {
    font-size: 13px;
    color: var(--ink-muted);
    text-decoration: none;
  }
  .source-link:hover { color: var(--accent); }

  /* ---------- States ---------- */
  .state {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-muted);
  }
  .state .icon {
    font-size: 32px;
    font-family: var(--serif);
    margin-bottom: 12px;
  }
  .state h2 {
    font-family: var(--serif);
    font-size: 24px;
    margin: 0 0 6px;
    color: var(--ink);
    font-weight: 500;
  }
  .state p { font-size: 14px; margin: 0; }

  /* ---------- Search results ---------- */
  .search-results .result {
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    display: flex;
    gap: 16px;
  }
  .search-results .result:hover h3 { color: var(--accent); }
  .search-results .result .result-thumb {
    width: 120px;
    height: 68px;
    border-radius: 6px;
    background: #efedea center / cover no-repeat;
    flex-shrink: 0;
  }
  .search-results .result .result-thumb.empty {
    background: linear-gradient(135deg, #efedea, #e3ded4);
  }
  .search-results .result .result-body { flex: 1; min-width: 0; }
  .search-results .result h3 {
    font-family: var(--serif);
    font-size: 20px;
    margin: 0 0 4px;
    font-weight: 600;
    color: var(--ink);
    transition: color .15s;
  }
  .search-results .result .channel-name {
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .search-results .result .snippet {
    color: var(--ink-soft);
    font-size: 14.5px;
    line-height: 1.55;
  }
  .search-results .result .keywords {
    margin-top: 6px;
    font-size: 12px;
    color: var(--ink-muted);
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 760px) {
    :root { --sidebar-w: 60px; }
    .sidebar-icon { width: 40px; height: 40px; font-size: 14px; }
    .sidebar-icon svg { width: 20px; height: 20px; }
    main { padding: 24px 16px 60px; }
    header.topbar { padding: 12px 16px; }
    .page-head h1 { font-size: 30px; }
    article.article h1 { font-size: 30px; }
    article.article p { font-size: 17px; }
    .grid { grid-template-columns: 1fr; gap: 20px; }
    .search-results .result .result-thumb { width: 80px; height: 45px; }
  }
</style>
</head>
<body>

<!-- Discord-style sidebar -->
<aside class="sidebar" id="sidebar">
  <a class="sidebar-icon" id="homeIcon" href="#/" title="All Articles">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/></svg>
    <span class="tooltip">All Articles</span>
  </a>
  <div class="sidebar-divider"></div>
  <div id="channelIcons"></div>
</aside>

<div class="main-wrap">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-title" id="topbarTitle">Knowledge Archive</div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Search articles, topics, keywords..." autocomplete="off">
      </div>
    </div>
  </header>

  <main>
    <section id="homeView" class="view active">
      <div class="page-head">
        <h1 id="homeTitle">All Articles</h1>
        <div class="meta" id="homeMeta"></div>
      </div>
      <div id="cardGrid" class="grid"></div>
      <div id="homeState" class="state" style="display:none;">
        <div class="icon">—</div>
        <h2>No articles yet</h2>
        <p>Run the pipeline to publish your first knowledge article.</p>
      </div>
    </section>

    <section id="searchView" class="view">
      <div class="page-head">
        <h1 id="searchTitle">Search</h1>
        <div class="meta" id="searchMeta"></div>
      </div>
      <div class="search-results" id="searchResults"></div>
    </section>

    <section id="articleView" class="view">
      <article class="article" id="articleBody"></article>
    </section>
  </main>
</div>

<script>
const STATE = {
  channels: [],
  search: [],
  currentChannel: null,
};

const $ = (sel) => document.querySelector(sel);
const views = { home: $('#homeView'), search: $('#searchView'), article: $('#articleView') };

function showView(name) {
  Object.values(views).forEach(v => v.classList.remove('active'));
  views[name].classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ---------- JSON fetch ---------- */
async function fetchJSON(path) {
  const base = window.location.pathname.replace(/\/[^/]*$/, '/');
  const url = base + path;
  const r = await fetch(url, { cache: 'no-cache' });
  if (!r.ok) throw new Error(`${path} -> ${r.status}`);
  return r.json();
}

/* ---------- Utils ---------- */
function escapeHTML(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function formatDate(yyyymmdd) {
  if (!yyyymmdd || String(yyyymmdd).length !== 8) return '';
  const y = yyyymmdd.slice(0,4), m = yyyymmdd.slice(4,6), d = yyyymmdd.slice(6,8);
  const dt = new Date(`${y}-${m}-${d}T00:00:00Z`);
  if (isNaN(dt)) return yyyymmdd;
  return dt.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
}
function formatDuration(sec) {
  sec = parseInt(sec,10) || 0;
  if (!sec) return '';
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if (h) return `${h}h ${m}m`;
  if (m) return `${m}m`;
  return `${s}s`;
}

/* ---------- Minimal markdown renderer ---------- */
function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHTML(text);
  // Headings
  html = html.replace(/^### (.+)$/gm, '\n<h3>$1</h3>\n');
  html = html.replace(/^## (.+)$/gm, '\n<h2>$1</h2>\n');
  // Bold
  html = html.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
  // Italic (avoid matching inside bold markers)
  html = html.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+?)`/g, '<code>$1</code>');
  // Links [text](url)
  html = html.replace(/\[([^\]]+?)\]\(([^)\s]+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Split into blocks by double newline
  const blocks = html.split(/\n{2,}/);
  let out = '';
  for (let block of blocks) {
    block = block.trim();
    if (!block) continue;
    // Already a heading?
    if (block.match(/^<h[23]>/)) { out += block; continue; }
    const lines = block.split('\n');
    // Bullet list?
    if (lines.every(l => l.trim().match(/^[-*]\s/))) {
      out += '<ul>' + lines.map(l => '<li>' + l.trim().replace(/^[-*]\s/, '') + '</li>').join('') + '</ul>';
    } else if (lines.every(l => l.trim().match(/^\d+\.\s/))) {
      out += '<ol>' + lines.map(l => '<li>' + l.trim().replace(/^\d+\.\s/, '') + '</li>').join('') + '</ol>';
    } else {
      out += '<p>' + lines.join('<br>') + '</p>';
    }
  }
  return out;
}

/* ---------- Channel icon helpers (Discord-style) ---------- */
function colorForName(name) {
  if (!name) return '#8b3a1f';
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 55%, 45%)`;
}
function initials(name) {
  if (!name) return '?';
  const words = name.trim().split(/\s+/);
  if (words.length === 1) return words[0].charAt(0).toUpperCase();
  return (words[0].charAt(0) + words[words.length-1].charAt(0)).toUpperCase();
}

/* ---------- Sidebar rendering ---------- */
function renderSidebar() {
  const container = $('#channelIcons');
  container.innerHTML = '';
  STATE.channels.forEach(ch => {
    const icon = document.createElement('a');
    icon.className = 'sidebar-icon' + (STATE.currentChannel === ch.slug ? ' active' : '');
    icon.href = `#/c/${encodeURIComponent(ch.slug)}`;
    icon.style.background = STATE.currentChannel === ch.slug ? colorForName(ch.name) : '#3a3c41';
    icon.innerHTML = `<span>${escapeHTML(initials(ch.name))}</span><span class="tooltip">${escapeHTML(ch.name)}</span>`;
    icon.addEventListener('mouseenter', () => {
      if (STATE.currentChannel !== ch.slug) icon.style.background = colorForName(ch.name);
    });
    icon.addEventListener('mouseleave', () => {
      if (STATE.currentChannel !== ch.slug) icon.style.background = '#3a3c41';
    });
    container.appendChild(icon);
  });
  // Update home icon active state
  $('#homeIcon').className = 'sidebar-icon' + (STATE.currentChannel === null ? ' active' : '');
}

/* ---------- Cards ---------- */
function renderCards(entries) {
  const grid = $('#cardGrid');
  grid.innerHTML = '';
  $('#homeState').style.display = entries.length ? 'none' : 'block';
  entries.forEach(e => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => { location.hash = `#/a/${encodeURIComponent(e.channel_slug||'')}/${e.video_id}`; };
    const thumbURL = e.thumbnail || '';
    const playSVG = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    card.innerHTML = `
      <div class="thumb ${thumbURL ? '' : 'empty'}" ${thumbURL ? `style="background-image:url(${thumbURL})"` : ''}>
        <div class="play-overlay">${playSVG}</div>
      </div>
      <div class="body">
        <div class="channel-name">${escapeHTML(e.channel||'')}</div>
        <h3>${escapeHTML(e.title||'(untitled)')}</h3>
        <p class="summary">${escapeHTML(e.summary||'')}</p>
        <div class="foot">
          <span>${formatDate(e.publish_date)}</span>
          <span>${escapeHTML(e.reading_time||'')}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

/* ---------- Home / channel view ---------- */
async function viewHome(channelSlug) {
  STATE.currentChannel = channelSlug || null;
  renderSidebar();
  showView('home');

  let entries = STATE.search.slice();
  if (channelSlug) {
    entries = entries.filter(e => e.channel_slug === channelSlug);
    const ch = STATE.channels.find(c => c.slug === channelSlug);
    $('#homeTitle').textContent = ch ? ch.name : channelSlug;
    $('#topbarTitle').textContent = ch ? ch.name : channelSlug;
    $('#homeMeta').textContent = `${entries.length} article${entries.length===1?'':'s'}`;
  } else {
    $('#homeTitle').textContent = 'All Articles';
    $('#topbarTitle').textContent = 'Knowledge Archive';
    const n = entries.length;
    const c = STATE.channels.length;
    $('#homeMeta').textContent = `${n} article${n===1?'':'s'} across ${c} channel${c===1?'':'s'}`;
  }
  // Sort newest first
  entries.sort((a,b) => (b.publish_date||'').localeCompare(a.publish_date||''));
  renderCards(entries);
}

/* ---------- Article view ---------- */
async function viewArticle(channelSlug, videoId) {
  showView('article');
  $('#articleBody').innerHTML = `<div class="state"><div class="icon">…</div><h2>Loading</h2><p>Fetching article…</p></div>`;
  if (!channelSlug) {
    const hit = STATE.search.find(e => e.video_id === videoId);
    channelSlug = hit ? hit.channel_slug : '';
  }
  try {
    const art = await fetchJSON(`channels/${channelSlug}/${videoId}.json`);
    renderArticle(art, channelSlug);
  } catch (err) {
    $('#articleBody').innerHTML = `<div class="state"><div class="icon">!</div><h2>Article not found</h2><p>${escapeHTML(err.message)}</p></div>`;
  }
}

function renderArticle(art, channelSlug) {
  const meta = art._meta || {};
  const channel = STATE.channels.find(c => c.slug === channelSlug);
  const wrap = $('#articleBody');

  const breadcrumb = `
    <div class="breadcrumb">
      <a href="#/">Archive</a> ›
      ${channel ? `<a href="#/c/${encodeURIComponent(channelSlug)}">${escapeHTML(channel.name)}</a> ›` : ''}
      <span>${escapeHTML(art.title||'')}</span>
    </div>`;

  const summaryBlock = art.summary
    ? `<div class="summary-block"><div class="label">Summary</div>${renderMarkdown(art.summary)}</div>`
    : '';

  const takeaways = (art.key_takeaways && art.key_takeaways.length)
    ? `<h2>Key Takeaways</h2><ul>${art.key_takeaways.map(t => `<li>${renderMarkdown(t)}</li>`).join('')}</ul>`
    : '';

  const sections = (art.sections || []).map(s => `
    <h2>${escapeHTML(s.heading||'')}</h2>
    ${renderMarkdown(s.body||'')}
  `).join('');

  const faq = (art.faq && art.faq.length)
    ? `<h2>FAQ</h2>${art.faq.map(f => `
        <div class="faq-item">
          <div class="q">${escapeHTML(f.question||'')}</div>
          <div class="a">${renderMarkdown(f.answer||'')}</div>
        </div>`).join('')}`
    : '';

  const tags = [...(art.topics||[]).map(t=>({t,kind:'topic'})), ...(art.keywords||[]).map(t=>({t,kind:'keyword'}))].slice(0,24);
  const tagsHTML = tags.length
    ? `<div class="tags">${tags.map(t=>`<a class="tag" href="#/q=${encodeURIComponent(t.t)}">${escapeHTML(t.t)}</a>`).join('')}</div>`
    : '';

  const hasEntities = (art.people&&art.people.length) || (art.companies&&art.companies.length) || (art.tools&&art.tools.length);
  const entities = hasEntities ? `
    <div class="entities">
      ${art.people&&art.people.length ? `<div><h4>People</h4><ul>${art.people.map(p=>`<li>${escapeHTML(p)}</li>`).join('')}</ul></div>`:''}
      ${art.companies&&art.companies.length ? `<div><h4>Companies</h4><ul>${art.companies.map(p=>`<li>${escapeHTML(p)}</li>`).join('')}</ul></div>`:''}
      ${art.tools&&art.tools.length ? `<div><h4>Tools</h4><ul>${art.tools.map(p=>`<li>${escapeHTML(p)}</li>`).join('')}</ul></div>`:''}
    </div>` : '';

  wrap.innerHTML = `
    ${breadcrumb}
    <h1>${escapeHTML(art.title||meta.title||'')}</h1>
    <div class="article-meta">
      ${channel?`<span class="channel-name">${escapeHTML(channel.name)}</span><span class="sep">·</span>`:''}
      ${meta.publish_date?`<span>${formatDate(meta.publish_date)}</span><span class="sep">·</span>`:''}
      ${art.reading_time?`<span>${escapeHTML(art.reading_time)}</span>`:''}
      ${meta.duration?`<span class="sep">·</span><span>${formatDuration(meta.duration)} video</span>`:''}
    </div>
    ${summaryBlock}
    ${takeaways}
    ${sections}
    ${faq}
    ${tagsHTML}
    ${entities}
    <div class="article-footer">
      <a class="btn-back" href="#/${channel?'c/'+encodeURIComponent(channelSlug):''}">← Back to ${channel?escapeHTML(channel.name):'archive'}</a>
      ${meta.video_url?`<a class="source-link" href="${escapeHTML(meta.video_url)}" target="_blank" rel="noopener">View original video on YouTube ↗</a>`:''}
    </div>
  `;
}

/* ---------- Search ---------- */
function viewSearch(query) {
  showView('search');
  $('#searchTitle').textContent = `Search: "${query}"`;
  $('#topbarTitle').textContent = 'Search';
  const q = query.toLowerCase().trim();
  if (!q) {
    $('#searchMeta').textContent = '';
    $('#searchResults').innerHTML = `<div class="state"><div class="icon">?</div><h2>Type to search</h2><p>Search runs across titles, summaries, topics and keywords.</p></div>`;
    return;
  }
  const results = STATE.search.filter(e => {
    const h = [e.title, e.summary, e.channel, (e.keywords||[]).join(' '), (e.topics||[]).join(' ')].join(' ').toLowerCase();
    return h.includes(q);
  }).sort((a,b) => {
    const at = (a.title||'').toLowerCase().includes(q) ? 0 : 1;
    const bt = (b.title||'').toLowerCase().includes(q) ? 0 : 1;
    return at - bt;
  });
  $('#searchMeta').textContent = `${results.length} result${results.length===1?'':'s'}`;
  $('#searchResults').innerHTML = results.length
    ? results.map(e => {
        const thumbURL = e.thumbnail || '';
        return `<div class="result" onclick="location.hash='#/a/${encodeURIComponent(e.channel_slug||'')}/${e.video_id}'">
          <div class="result-thumb ${thumbURL?'':'empty'}" ${thumbURL?`style="background-image:url(${thumbURL})"`:''}></div>
          <div class="result-body">
            <div class="channel-name">${escapeHTML(e.channel||'')}</div>
            <h3>${escapeHTML(e.title||'')}</h3>
            <div class="snippet">${escapeHTML((e.summary||'').slice(0,200))}</div>
            ${(e.keywords||[]).slice(0,5).length ? `<div class="keywords">${e.keywords.slice(0,5).map(k=>escapeHTML(k)).join(' · ')}</div>` : ''}
          </div>
        </div>`;
      }).join('')
    : `<div class="state"><div class="icon">—</div><h2>No matches</h2><p>Try a different query.</p></div>`;
}

/* ---------- Router ---------- */
function router() {
  const hash = location.hash.replace(/^#\/?/, '');
  if (hash.startsWith('q=')) { const q = decodeURIComponent(hash.slice(2)); $('#searchInput').value = q; viewSearch(q); return; }
  if (hash.startsWith('a/')) { const parts = hash.slice(2).split('/'); viewArticle(parts[0]?decodeURIComponent(parts[0]):'', parts[1]||''); return; }
  if (hash.startsWith('c/')) { viewHome(decodeURIComponent(hash.slice(2))); return; }
  viewHome(null);
}

/* ---------- Search input ---------- */
let searchTimer = null;
$('#searchInput').addEventListener('input', (e) => {
  const v = e.target.value.trim();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (v) location.hash = `#/q=${encodeURIComponent(v)}`;
    else if (location.hash.startsWith('#/q=')) location.hash = '#/';
  }, 220);
});

$('#homeIcon').addEventListener('click', (e) => {
  e.preventDefault();
  location.hash = '#/';
  $('#searchInput').value = '';
});

/* ---------- Init ---------- */
async function init() {
  try {
    const [channels, search] = await Promise.all([
      fetchJSON('channels.json').catch(() => []),
      fetchJSON('search.json').catch(() => []),
    ]);
    STATE.channels = Array.isArray(channels) ? channels : [];
    STATE.search = (Array.isArray(search) ? search : []).map(e => {
      if (!e.channel_slug) {
        const ch = STATE.channels.find(c => c.name === e.channel);
        e.channel_slug = ch ? ch.slug : '';
      }
      return e;
    });
  } catch (err) { console.error('init failed', err); }
  window.addEventListener('hashchange', router);
  router();
}
init();
</script>
